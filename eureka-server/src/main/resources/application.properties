server.port=8761
spring.application.name=eureka-server

# ============================================================
# EUREKA SERVER — do not register itself as a client
# ============================================================
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Skip waiting for peers on startup (standalone mode — no Eureka cluster)
eureka.server.wait-time-in-ms-when-sync-empty=0

# Disable self-preservation in dev — registry cleans up instantly when a service goes down
eureka.server.enable-self-preservation=false

# ============================================================
# ACTUATOR
# ============================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

info.app.name=Eureka Server
info.app.version=1.0.0

# ============================================================
# LOGGING
# ============================================================
logging.level.com.netflix.eureka=WARN
logging.level.com.netflix.discovery=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
