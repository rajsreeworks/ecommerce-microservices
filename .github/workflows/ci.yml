name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ============================================================
  # Run tests for product-service (parallel with order-service)
  # ============================================================
  test-product-service:
    name: Test — product-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: product-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Test + JaCoCo 80% coverage check
        run: ./mvnw verify

  # ============================================================
  # Run tests for order-service (parallel with product-service)
  # ============================================================
  test-order-service:
    name: Test — order-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: order-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Test + JaCoCo 80% coverage check
        run: ./mvnw verify

  # ============================================================
  # Build and push Docker images — only after both test jobs pass
  # Only runs on push to main (not on pull requests)
  # Builds all 4 images in parallel via matrix
  # ============================================================
  build-and-push:
    name: Docker — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [ test-product-service, test-order-service ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - product-service
          - order-service
          - eureka-server
          - api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}
