# Disable Eureka during tests
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# These must be repeated here because src/test/resources/application.properties shadows
# the main one on the test classpath — properties not listed here are not loaded.

# Enable circuit breaker so the fallback factory is active
spring.cloud.openfeign.circuitbreaker.enabled=true
spring.cloud.openfeign.circuitbreaker.group.enabled=true

# Apache HttpClient 5 — required for PATCH Feign calls
spring.cloud.openfeign.httpclient.hc5.enabled=true

# Raise CB thresholds so the circuit never opens during the test suite.
# Tests make <10 Feign calls total, so 100 is safely above that.
resilience4j.circuitbreaker.instances.product-service.minimum-number-of-calls=100
resilience4j.circuitbreaker.instances.product-service.sliding-window-size=100
