# ============================================================
# APPLICATION
# ============================================================
spring.application.name=order-service
server.port=8082

# ============================================================
# DATASOURCE — H2 (dev/test)
# ============================================================
spring.datasource.url=jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# H2 CONSOLE (dev only)
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# OPENFEIGN — HTTP client
# Apache HttpClient 5 is required — Java's HttpURLConnection blocks PATCH
spring.cloud.openfeign.httpclient.hc5.enabled=true

# Enable Resilience4j circuit breaker for all Feign clients
# Without this, fallbackFactory in @FeignClient is silently ignored
spring.cloud.openfeign.circuitbreaker.enabled=true

# Group all methods of the same Feign client under one circuit breaker
# CB name = Feign client name ("product-service") instead of per-method
spring.cloud.openfeign.circuitbreaker.group.enabled=true

# ============================================================
# OPENFEIGN — Product Service URL
# Overridden in Docker via PRODUCT_SERVICE_URL env var
# ============================================================
product.service.url=http://localhost:8081

# ============================================================
# RESILIENCE4J — Circuit Breaker for ProductServiceClient#getProductById
# ============================================================

resilience4j.circuitbreaker.instances.ProductServiceClientgetProductByIdLong.sliding-window-size=10
resilience4j.circuitbreaker.instances.ProductServiceClientgetProductByIdLong.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.ProductServiceClientgetProductByIdLong.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.ProductServiceClientgetProductByIdLong.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.ProductServiceClientgetProductByIdLong.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.ProductServiceClientgetProductByIdLong.permitted-number-of-calls-in-half-open-state=3

# ============================================================
# RESILIENCE4J — Circuit Breaker for ProductServiceClient#reduceStock
# ============================================================

resilience4j.circuitbreaker.instances.ProductServiceClientreduceStockLongint.sliding-window-size=10
resilience4j.circuitbreaker.instances.ProductServiceClientreduceStockLongint.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.ProductServiceClientreduceStockLongint.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.ProductServiceClientreduceStockLongint.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.ProductServiceClientreduceStockLongint.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.ProductServiceClientreduceStockLongint.permitted-number-of-calls-in-half-open-state=3

# ============================================================
# ACTUATOR
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
management.info.env.enabled=true

info.app.name=Order Service
info.app.version=1.0.0

# ============================================================
# SPRINGDOC / SWAGGER
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================================================
# EUREKA CLIENT
# Overridden in Docker via EUREKA_CLIENT_SERVICEURL_DEFAULTZONE env var
# ============================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.client.enabled=true

# ============================================================
# LOGGING
# ============================================================
logging.level.com.naveen.orderservice=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
